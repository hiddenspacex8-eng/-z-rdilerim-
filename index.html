<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sana Bir Sürpriz 🤍</title>
<style>
#pencere-kilidi { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffdde1; z-index: 100000; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: Arial, sans-serif;}
.sifre-kutusu { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 85%; width: 300px;}
.sifre-kutusu h2 { color: #ff2d75; margin-bottom: 20px; font-size: 22px;}
.sifre-kutusu input { width: 85%; padding: 12px; font-size: 18px; border: 2px solid #ffdde1; border-radius: 10px; outline: none; text-align: center; margin-bottom: 15px; transition: 0.3s;}
.sifre-kutusu input:focus { border-color: #ff2d75;}
.sifre-kutusu button.giris-btn { background: #ff2d75; color: white; border: none; padding: 12px 25px; font-size: 18px; border-radius: 25px; cursor: pointer; width: 90%; transition: 0.3s;}
.sifre-kutusu button.giris-btn:hover { background: #ff4d88; transform: scale(1.03);}
#hata-mesaji { color: red; margin-top: 10px; font-weight: bold; display: none;}
body { background: #ffdde1; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; min-height: 100vh; padding-bottom: 40px;}
h1 { margin-top: 30px; font-size: 36px; color: red;}
p { font-size: 20px; color: #444; padding: 0 15px;}
.neon { color: white; font-size: 36px; text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 20px #ff00ff;}
.gallery-wrapper { margin: 40px auto; max-width: 90%; width: 350px;}
.gallery-container { position: relative; width: 100%; height: 350px; background: #fff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border: 5px solid #fff;}
.gallery-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s ease-in-out; display: flex; justify-content: center; align-items: center;}
.gallery-slide.active { opacity: 1; z-index: 2;}
.gallery-slide img { width: 100%; height: 100%; object-fit: cover; border-radius: 15px;}
.gallery-controls { margin-top: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: bold; color: #ff2d75;}
.nav-btn { background: #ff2d75; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 16px;}
.nav-btn:hover { background: #ff4d88;}
.music-player-container { margin: 30px auto; background: white; padding: 15px 25px; border-radius: 30px; box-shadow: 0 8px 20px rgba(255, 45, 117, 0.15); display: inline-flex; align-items: center; gap: 15px; border: 2px solid #ffb3c6;}
.music-title { font-size: 16px; font-weight: bold; color: #ff2d75;}
.music-btn { background: #ff2d75; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center; transition: 0.2s; box-shadow: 0 4px 10px rgba(255, 45, 117, 0.3);}
.music-btn:hover { background: #ff4d88; transform: scale(1.05);}

/* ===== GECE MODU ===== */
#darkModeBtn{
position:fixed;
top:15px;
right:15px;
background:#ff2d75;
color:#fff;
border:none;
padding:10px 16px;
border-radius:25px;
cursor:pointer;
z-index:99999;
font-size:16px;
}

.dark-mode{
background:#0b1020 !important;
color:white;
transition:.5s;
}

.dark-mode p,
.dark-mode h1,
.dark-mode h2,
.dark-mode .music-title,
.dark-mode #ask-sayaci{
color:white !important;
}

.dark-mode .gallery-container,
.dark-mode .music-player-container{
background:#1c1c1c;
border-color:#555;
}

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
pointer-events:none;
z-index:-1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:blink 2s infinite alternate;
}

@keyframes blink{
from{opacity:.2;}
to{opacity:1;}
}

#moon{
position:fixed;
top:20px;
left:20px;
font-size:55px;
display:none;
filter:drop-shadow(0 0 15px white);
z-index:2;
}

#unlockAnimation{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 99999;
}

#lockIcon{
    font-size: 100px;
    animation: unlockEffect 1.5s ease forwards;
}

@keyframes unlockEffect{
    0%{
        transform: scale(0.5) rotate(0deg);
        opacity:0;
    }
    50%{
        transform: scale(1.3) rotate(-15deg);
        opacity:1;
    }
    100%{
        transform: scale(1) rotate(0deg);
        opacity:0;
    }
}
</style>
</head>
<body>

<button id="darkModeBtn" onclick="toggleDarkMode()">🌙 Gece Modu</button>
<div id="stars"></div>
<div id="moon">🌙</div>

<!-- KİLİT AÇILMA ANİMASYONU ETİKETİ -->
<div id="unlockAnimation">
    <div id="lockIcon">🔓</div>
</div>

<audio id="real-audio" loop preload="auto">
    <source src="sarkimiz.mp3" type="audio/mpeg">
    <source src="sarkimiz.m4a" type="audio/mp4">
    Tarayıcınız ses etiketini desteklemiyor.
</audio>

<div id="pencere-kilidi">
    <div class="sifre-kutusu">
        <h2>🤍 Bu Site Sevgilime Özeldir 🤍</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 15px;">Lütfen giriş yapmak için şifreyi giriniz:</p>
        <input type="password" id="sifreInput" placeholder="Şifre...">
        <button class="giris-btn" onclick="sifreyiKontrolEt()">Giriş Yap 💖</button>
        <div id="hata-mesaji">Yanlış şifre, tekrar dene aşkım! 🥺</div>
    </div>
</div>

<div class="sayac-kutusu" style="text-align: center; margin: 20px; font-family: sans-serif;">
    <h2 style="color: #ff4d6d;">Birlikte Geçen Zamanımız</h2>
    <div id="ask-sayaci" style="font-size: 24px; font-weight: bold; color: #333;">Hesaplanıyor...</div>
</div>

<h1 class="neon">Sevgilim</h1>
<p>İyi ki hayatımdasın...<br><br>Her gün seni sevmek benim için en güzel mutluluk.<br><br>Sonsuza kadar birlikte olalım. 💍🤍</p>

<div class="gallery-wrapper">
  <div class="gallery-container">
    <div class="gallery-slide active"><img src="IMG_20260526_213453.jpg" alt="Anı 1"></div>
    <div class="gallery-slide"><img src="IMG_20260619_115607.jpg" alt="Anı 2"></div>
    <div class="gallery-slide"><img src="IMG_20260708_162842_849.jpg" alt="Anı 3"></div>
    <div class="gallery-slide"><img src="IMG_20260716_223451_661.jpg" alt="Anı 4"></div>
    <div class="gallery-slide"><img src="IMG_20260716_223542_995.jpg" alt="Anı 5"></div>
    <div class="gallery-slide"><img src="6.jpg" alt="Anı 6"></div>
    <div class="gallery-slide"><img src="7.jpg" alt="Anı 7"></div>
    <div class="gallery-slide"><img src="hailuo_1784235468.png" alt="Anı 8"></div>
    <div class="gallery-slide"><img src="9.jpg" alt="Anı 9"></div>
    <div class="gallery-slide"><img src="10.jpg" alt="Anı 10"></div>
  </div>
  <div class="gallery-controls">
    <button id="prevBtn" class="nav-btn" onclick="changeSlide(-1)">◀ Önceki</button>
    <span id="photoCounter">1 / 10</span>
    <button id="nextBtn" class="nav-btn" onclick="changeSlide(1)">Sonraki ▶</button>
  </div>
</div>

<div class="music-player-container">
    <span class="music-title">Şarkımız 🎶</span>
    <button id="play-pause-btn" class="music-btn" onclick="toggleMusic()">▶</button>
</div>

<script>
// 1. ŞİFRE KONTROLÜ VE ANİMASYON TETİKLEME
function sifreyiKontrolEt() {
    var girilen = document.getElementById("sifreInput").value.trim();
    var dogru = "28.04.2026";
    if (girilen === dogru) {
        document.getElementById("pencere-kilidi").style.display = "none";
        const anim = document.getElementById("unlockAnimation");
        if(anim) anim.style.display = "flex";

        setTimeout(() => {
            if(anim) anim.style.display = "none";
            
            // Animasyon bittikten sonra müziği çalmayı dene
            var audio = document.getElementById("real-audio");
            if (audio) {
                audio.play().then(function() {
                    document.getElementById("play-pause-btn").innerHTML = "⏸";
                }).catch(function(e) {
                    console.log("Tarayıcı koruması nedeniyle manuel başlatma gerekebilir.");
                });
            }
        }, 1500);
    } else {
        document.getElementById("hata-mesaji").style.display = "block";
    }
}

// 2. MÜZİK ÇALAR KONTROLÜ
function toggleMusic() {
    var audio = document.getElementById("real-audio");
    var btn = document.getElementById("play-pause-btn");
    if (audio.paused) {
        audio.play();
        btn.innerHTML = "⏸";
    } else {
        audio.pause();
        btn.innerHTML = "▶";
    }
}

// 3. FOTOĞRAF GALERİSİ KONTROLÜ
let currentSlide = 0;
const slides = document.querySelectorAll('.gallery-slide');
const counter = document.getElementById('photoCounter');

function changeSlide(direction) {
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + direction + slides.length) % slides.length;
    slides[currentSlide].classList.add('active');
    counter.innerHTML = (currentSlide + 1) + " / " + slides.length;
}

// 4. GECE MODU KONTROLÜ VE YILDIZ OLUŞTURMA
function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    document.getElementById('stars').style.display = isDark ? 'block' : 'none';
    document.getElementById('moon').style.display = isDark ? 'block' : 'none';
    document.getElementById('darkModeBtn').innerHTML = isDark ? "☀️ Gündüz Modu" : "🌙 Gece Modu";
}

// Yıldızları dinamik olarak arka plana yerleştirme
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 100; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 2 + 's';
