<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sana Bir Sürpriz 🤍</title>
<style>
body {
    background: #ffdde1;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
    margin: 0;
    padding: 0;
}
h1 {
    margin-top: 50px;
    font-size: 50px;
    color: red;
}
p {
    font-size: 28px;
    color: #444;
}
.neon {
    color: white;
    font-size: 50px;
    text-shadow:
    0 0 5px #ff00ff,
    0 0 10px #ff00ff,
    0 0 20px #ff00ff,
    0 0 40px #ff00ff;
}
.corner-heart {
    position: fixed;
    color: white;
    font-size: 35px;
    z-index: 9999;
    text-shadow: 0 0 10px pink;
    animation: pulse 1.5s infinite;
}
.top-left { top: 15px; left: 15px; }
.top-right { top: 15px; right: 15px; }
.bottom-left { bottom: 15px; left: 15px; }
.bottom-right { bottom: 15px; right: 15px; }

@keyframes pulse {
    50% {
        transform: scale(1.3);
    }
}

#btnAffet {
    background: #ff2d75;
    color: white;
    border: none;
    padding: 15px 35px;
    font-size: 22px;
    border-radius: 40px;
    cursor: pointer;
    transition: 0.3s;
}
#btnAffet:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px #ff4d88;
}
</style>
</head>
<body>

<div class="sayac-kutusu" style="text-align: center; margin: 20px; font-family: sans-serif;">
    <h2 style="color: #ff4d6d;">Birlikte Geçen Zamanımız:</h2>
    <div id="ask-sayaci" style="font-size: 24px; font-weight: bold; color: #333;">Hesaplanıyor...</div>
</div>

<h1>🤍Seni Çok Seviyorum🤍</h1>
<h1 class="neon">🤍Sevgilim🤍</h1>

<p>
İyi ki hayatımdasın...<br><br>
Her gün seni sevmek benim için en güzel mutluluk.<br><br>
Sonsuza kadar birlikte olalım. 💍🤍
</p>

<div style="text-align:center; margin-top:40px;">
    <button id="btnAffet" onclick="affet()">
        💖 Beni Affeder misin?
    </button>
    <p id="cevap" style="font-size:24px; color:#ff0066; font-weight:bold; margin-top:20px;"></p>
</div>

<!-- Köşelerde Sabit Duran Kalpler -->
<div class="corner-heart top-left">🤍</div>
<div class="corner-heart top-right">🤍</div>
<div class="corner-heart bottom-left">🤍</div>
<div class="corner-heart bottom-right">🤍</div>

<script>
// Aşk Sayacı Kodu
const baslangicTarihi = new Date("2026-04-28T00:00:00").getTime();

setInterval(function() {
    const simdi = new Date().getTime();
    const fark = simdi - baslangicTarihi;

    const gun = Math.floor(fark / (1000 * 60 * 60 * 24));
    const saat = Math.floor((fark % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const dakika = Math.floor((fark % (1000 * 60 * 60)) / (1000 * 60));
    const saniye = Math.floor((fark % (1000 * 60)) / 1000);

    document.getElementById("ask-sayaci").innerHTML = 
        gun + " Gün " + saat + " Saat " + dakika + " Dakika " + saniye + " Saniye";
}, 1000);

// Buton Tıklama Kodu (Aşağı akan kalpler temizlendi)
function affet(){
    document.getElementById("cevap").innerHTML =
    "🥹💗 🥺💗 Teşekkür ederim, Sevgilim... Seni bir daha üzmemek için elimden geleni yapacağım.. 💗";
}
</script>

</body>
</html>
