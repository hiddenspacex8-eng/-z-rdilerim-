<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sana Bir Sürpriz 🤍</title>
<style>
body {
    background: #ffdde1;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    padding-bottom: 50px;
}
h1 {
    margin-top: 30px;
    font-size: 36px;
    color: red;
}
p {
    font-size: 20px;
    color: #444;
    padding: 0 15px;
}
.neon {
    color: white;
    font-size: 36px;
    text-shadow:
    0 0 5px #ff00ff,
    0 0 10px #ff00ff,
    0 0 20px #ff00ff;
}
.corner-heart {
    position: fixed;
    color: white;
    font-size: 35px;
    z-index: 9999;
    text-shadow: 0 0 10px pink;
    animation: pulse 1.5s infinite;
}
.top-left { top: 15px; left: 15px; }
.top-right { top: 15px; right: 15px; }
.bottom-left { bottom: 15px; left: 15px; }
.bottom-right { bottom: 15px; right: 15px; }

@keyframes pulse {
    50% { transform: scale(1.3); }
}

/* FOTOĞRAF GALERİSİ TASARIMI */
.gallery-wrapper {
    margin: 40px auto;
    max-width: 90%;
    width: 350px;
}
.gallery-container {
    position: relative;
    width: 100%;
    height: 350px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    overflow: hidden;
    border: 5px solid #fff;
}
.gallery-slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
    display: flex;
    justify-content: center;
    align-items: center;
}
.gallery-slide.active {
    opacity: 1;
    z-index: 2;
}
.gallery-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 15px;
}
.gallery-controls {
    margin-top: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
    font-weight: bold;
    color: #ff2d75;
}
.nav-btn {
    background: #ff2d75;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 16px;
}
.nav-btn:hover {
    background: #ff4d88;
}
</style>
</head>
<body>

<div class="sayac-kutusu" style="text-align: center; margin: 20px; font-family: sans-serif;">
    <h2 style="color: #ff4d6d;">Birlikte Geçen Zamanımız:</h2>
    <div id="ask-sayaci" style="font-size: 24px; font-weight: bold; color: #333;">Hesaplanıyor...</div>
</div>

<h1>🤍Seni Çok Seviyorum🤍</h1>
<h1 class="neon">🤍Sevgilim🤍</h1>

<p>
İyi ki hayatımdasın...<br><br>
Her gün seni sevmek benim için en güzel mutluluk.<br><br>
Sonsuza kadar birlikte olalım. 💍🤍
</p>

<!-- FOTOĞRAF GALERİSİ -->
<div class="gallery-wrapper">
  <div class="gallery-container">
    <div class="gallery-slide active"><img src="IMG_20260526_213453.jpg" alt="Anı 1"></div>
    <div class="gallery-slide"><img src="IMG_20260619_115607.jpg" alt="Anı 2"></div>
    <div class="gallery-slide"><img src="IMG_20260708_162842_849.jpg" alt="Anı 3"></div>
    <div class="gallery-slide"><img src="IMG_20260716_223451_661.jpg" alt="Anı 4"></div>
    <div class="gallery-slide"><img src="IMG_20260716_223542_995.jpg" alt="Anı 5"></div>
    <div class="gallery-slide"><img src="6.jpg" alt="Anı 6"></div>
    <div class="gallery-slide"><img src="7.jpg" alt="Anı 7"></div>
    <div class="gallery-slide"><img src="hailuo_1784235468.png" alt="Anı 8"></div>
    <div class="gallery-slide"><img src="9.jpg" alt="Anı 9"></div>
    <div class="gallery-slide"><img src="10.jpg" alt="Anı 10"></div>
  </div>

  <div class="gallery-controls">
    <button id="prevBtn" class="nav-btn">◀ Önceki</button>
    <span id="photoCounter">1 / 10</span>
    <button id="nextBtn" class="nav-btn">Sonraki ▶</button>
  </div>
</div>

<!-- Köşelerde Sabit Duran Kalpler -->
<div class="corner-heart top-left">🤍</div>
<div class="corner-heart top-right">🤍</div>
<div class="corner-heart bottom-left">🤍</div>
<div class="corner-heart bottom-right">🤍</div>

<script>
// Aşk Sayacı Kodu
const baslangicTarihi = new Date("2026-04-28T00:00:00").getTime();

setInterval(function() {
    const simdi = new Date().getTime();
    const fark = simdi - baslangicTarihi;

    const gun = Math.floor(fark / (1000 * 60 * 60 * 24));
    const saat = Math.floor((fark % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const dakika = Math.floor((fark % (1000 * 60 * 60)) / (1000 * 60));
    const saniye = Math.floor((fark % (1000 * 60)) / 1000);

    document.getElementById("ask-sayaci").innerHTML = 
        gun + " Gün " + saat + " Saat " + dakika + " Dakika " + saniye + " Saniye";
}, 1000);

// GALERİ ÇALIŞMA KODU
const slides = document.querySelectorAll('.gallery-slide');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const counter = document.getElementById('photoCounter');
let currentSlide = 0;

function updateGallery() {
    slides.forEach((slide, index) => {
        if(index === currentSlide) {
            slide.classList.add('active');
        } else {
            slide.classList.remove('active');
        }
    });
    counter.textContent = (currentSlide + 1) + " / " + slides.length;
}

nextBtn.addEventListener('click', () => {
    currentSlide = (currentSlide + 1) % slides.length;
    updateGallery();
});

prevBtn.addEventListener('click', () => {
    currentSlide = (currentSlide - 1 + slides.length) % slides.length;
    updateGallery();
});
</script>

</body>
</html>
